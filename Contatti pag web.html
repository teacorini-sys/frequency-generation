<style>
:root {
  --gold: #f5c527;
  --beige: #e2d0b0;
}

*, *::before, *::after {

  margin: 0;
  padding: 0;
}

html, body {
  background: #000000 !important;
  min-height: 100vh;
  overflow-x: hidden;
}

/* REGOLA BASE: tutto il testo è beige corsivo */
body {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--beige);

/* REGOLA TITOLI: Cinzel stampatello oro */

.page-title,
.nav-brand,
.contact-info-title,
.form-label,

}

/* ---- SFONDO FREQUENZE SVG ---- */
.bg-frequencies {

  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;

}

/* ---- NAVBAR ---- */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;

  padding: 18px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,0.9) !important;
  backdrop-filter: blur(10px);

}
.nav-brand {
  font-size: 1.1rem;
  letter-spacing: 4px;
  text-decoration: none;
}
.nav-back {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--beige);
  text-decoration: none;
  transition: color 0.3s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-back::before { content: '←'; }
.nav-back:hover { color: var(--gold); }

/* ---- LAYOUT ---- */
.page-wrapper {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 120px 20px 80px;
}

/* ---- HEADER ---- */
.page-header {
  text-align: center;
  margin-bottom: 60px;
}
.page-label {
  font-size: 0.8rem;
  letter-spacing: 6px;
  display: block;
  margin-bottom: 16px;
  opacity: 0.8;
}
.page-title {

  line-height: 1.1;

}
.page-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.4rem;
  color: var(--beige);
  margin-top: 16px;
  letter-spacing: 1px;
}

/* ---- DIVIDER ---- */
.divider {
  width: 60px;
  height: 1px;
  background: rgba(245,197,39,0.3);
  margin: 0 auto 60px;
}

/* ---- CONTAINER ---- */
.contact-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  max-width: 960px;
  width: 100%;
  align-items: start;
}

/* ---- INFO ---- */
.contact-info {
  padding: 40px;
  border: 1px solid rgba(245,197,39,0.2);
  border-radius: 4px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  text-align: left;
}
.contact-info-title {
  font-size: 1rem;
  letter-spacing: 4px;
  margin-bottom: 36px;
  padding-bottom: 16px;
  border-bottom: 1px solid rgba(245,197,39,0.15);
}
.contact-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 32px;
}
.contact-item:last-child { margin-bottom: 0; }
.contact-item-label {
  font-family: 'Cinzel', serif !important;
  font-style: normal !important;
  color: var(--gold) !important;
  font-size: 0.7rem;
  letter-spacing: 4px;
  text-transform: uppercase;
}
.contact-item-value {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.3rem;
  color: var(--beige);
  letter-spacing: 0.5px;
  text-decoration: none;
  transition: color 0.3s;
}
.contact-item-value:hover { color: var(--gold); }
.wave-deco { margin-top: 40px; opacity: 0.3; }

/* ---- FORM ---- */
.contact-form {
  padding: 40px;
  border: 1px solid rgba(245,197,39,0.2);
  border-radius: 4px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  text-align: left;
}
.form-group { margin-bottom: 28px; }
.form-label {
  font-size: 0.7rem;
  letter-spacing: 4px;
  display: block;
  margin-bottom: 10px;
}
.form-input,
.form-textarea {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(245,197,39,0.3);
  color: var(--beige);
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.1rem;
  padding: 10px 0;
  outline: none;
  transition: border-color 0.3s;
  letter-spacing: 0.5px;
}
.form-input::placeholder,
.form-textarea::placeholder {
  color: rgba(226,208,176,0.45);
  font-style: italic;
}
.form-input:focus,
.form-textarea:focus { border-bottom-color: var(--gold); }
.form-textarea { resize: none; height: 100px; line-height: 1.7; }

.btn-send {
  font-size: 0.85rem;
  letter-spacing: 4px;
  color: #000000;
  background: var(--gold);
  border: 2px solid var(--gold);
  padding: 16px 44px;
  border-radius: 50px;
  cursor: pointer;
  transition: background 0.3s, color 0.3s, box-shadow 0.3s, transform 0.3s;
  box-shadow: 0 0 20px rgba(245,197,39,0.3);
  margin-top: 10px;
  width: 100%;
}
.btn-send:hover {
  background: transparent;
  color: var(--gold);
  box-shadow: 0 0 35px rgba(245,197,39,0.5);
  transform: translateY(-2px);
}

.form-success {
  display: none;
  text-align: center;
  padding: 30px 0;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.2rem;
  color: var(--beige);
  letter-spacing: 1px;
}

/* ---- RESPONSIVE ---- */
@media (max-width: 768px) {
  .contact-container { grid-template-columns: 1fr; gap: 30px; }
  nav { padding: 16px 20px; }
  .contact-info, .contact-form { padding: 28px 22px; }
}
</style>
